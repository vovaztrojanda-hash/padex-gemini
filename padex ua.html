<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padex Browser</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --accent-color: #00bcd4;
            --bar-bg: rgba(20, 20, 20, 0.75);
            --card-bg: rgba(255, 255, 255, 0.08);
            --panel-bg: rgba(0, 0, 0, 0.65);
        }

        body {
            background: linear-gradient(135deg, #7da0b5, #9cb7c9, #b5cbd8);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: white;
            transition: background 0.3s;
        }

        /* Верхняя панель управления */
        .top-bar {
            background: var(--bar-bg);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        /* Обновленный бренд с поддержкой логотипа-картинки */
        .brand {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--accent-color);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px; /* Отступ между логотипом и текстом */
            user-select: none;
        }

        .brand img {
            width: 35px;
            height: 35px;
            object-fit: contain;
            filter: drop-shadow(0 0 6px var(--accent-color)); /* Легкое свечение под цвет темы */
            transition: transform 0.3s;
        }

        .brand:hover img {
            transform: scale(1.1) rotate(5deg); /* Эффект при наведении */
        }

        /* Поисковая строка */
        .address-bar {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            transition: 0.2s;
        }

        .address-bar:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: var(--accent-color);
        }

        .controls-group {
            display: flex;
            gap: 10px;
            position: relative;
        }

        /* Контейнер для VPN */
        .vpn-container {
            position: relative;
        }

        .vpn-btn {
            background: #ff5722;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(255, 87, 34, 0.4);
            white-space: nowrap;
        }

        .vpn-btn.active {
            background: #4caf50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
        }

        /* Выпадающее меню VPN локаций */
        .vpn-dropdown {
            display: none;
            position: absolute;
            top: 45px;
            right: 0;
            background: rgba(25, 25, 25, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            width: 160px;
            overflow: hidden;
            z-index: 20;
            flex-direction: column;
        }

        .vpn-dropdown.active {
            display: flex;
        }

        .vpn-option {
            background: transparent;
            color: white;
            border: none;
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vpn-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .vpn-option.disconnect {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #ff5722;
        }

        .vpn-option.disconnect:hover {
            background: rgba(255, 87, 34, 0.15);
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(30deg);
        }

        .browser-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Сетка закладок */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(5, 160px);
            gap: 20px;
            background: var(--panel-bg);
            padding: 35px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            z-index: 2;
        }

        .bookmark-card {
            background: var(--card-bg);
            padding: 20px 15px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .bookmark-card:hover {
            background: rgba(0, 188, 212, 0.2);
            border-color: var(--accent-color);
            transform: translateY(-5px);
        }

        .bookmark-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Настройки */
        .settings-modal {
            display: none;
            position: absolute;
            background: rgba(25, 25, 25, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 5;
            flex-direction: column;
            gap: 20px;
        }

        .settings-modal.active {
            display: flex;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
        }
        .close-btn:hover { color: white; }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-item select {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Панель управления -->
    <div class="top-bar">
        <!-- Логотип добавлен сюда -->
        <div class="brand">
            <img src="padex_logo.png" alt="Padex Logo">
            <span>Padex</span>
        </div>
        <input type="text" class="address-bar" id="url-input" placeholder="Введіть запит або адресу сайту..." onkeydown="handleSearch(event)">
        <div class="controls-group">
            <div class="vpn-container">
                <button class="vpn-btn" id="vpn-toggle" onclick="toggleVpnDropdown()">VPN: ВИМК</button>
                <div class="vpn-dropdown" id="vpn-dropdown">
                    <button class="vpn-option" onclick="connectVPN('USA', '🇺🇸 USA')">🇺🇸 Америка</button>
                    <button class="vpn-option" onclick="connectVPN('UKR', '🇺🇦 UKR')">🇺🇦 Україна</button>
                    <button class="vpn-option" onclick="connectVPN('RUS', '🇷🇺 RUS')">🇷🇺 Росія</button>
                    <button class="vpn-option disconnect" onclick="disconnectVPN()">❌ Вимкнути</button>
                </div>
            </div>
            <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
        </div>
    </div>

    <!-- Контент -->
    <div class="browser-content">
        <div class="bookmarks-grid">
            <a href="https://mail.google.com" target="_blank" class="bookmark-card">
                <div class="bookmark-icon" style="background: #ea4335;">M</div> <span id="lbl-mail">Google Пошта</span>
            </a>
            <a href="https://www.youtube.com" target="_blank" class="bookmark-card">
                <div class="bookmark-icon" style="background: #ff0000;">Y</div> YouTube
            </a>
            <a href="https://music.youtube.com" target="_blank" class="bookmark-card">
                <div class="bookmark-icon" style="background: linear-gradient(45deg, #ff0000, #232323);">🎵</div> YT Music
            </a>
            <a href="https://www.google.com/maps" target="_blank" class="bookmark-card">
                <div class="bookmark-icon" style="background: #4caf50;">📍</div> <span id="lbl-maps">Google Карти</span>
            </a>
            <a href="https://gemini.google.com" target="_blank" class="bookmark-card">
                <div class="bookmark-icon" style="background: linear-gradient(45deg, #1a73e8, #7460ee);">✨</div> Gemini AI
            </a>
            <a href="https://adderly.top/" target="_blank" class="bookmark-card">
                <div class="bookmark-icon" style="background: #9c27b0;">🌐</div> Adderly
            </a>
            <a href="https://itch.io/" target="_blank" class="bookmark-card">
                <div class="bookmark-icon" style="background: #fa5c5c;">🎮</div> Itch.io
            </a>
            <a href="https://store.steampowered.com/" target="_blank" class="bookmark-card">
                <div class="bookmark-icon" style="background: #171a21;">♨️</div> Steam
            </a>
            <a href="https://github.com" target="_blank" class="bookmark-card">
                <div class="bookmark-icon" style="background: #24292e;">🐙</div> GitHub
            </a>
            <a href="https://discord.com" target="_blank" class="bookmark-card">
                <div class="bookmark-icon" style="background: #5865F2;">💬</div> Discord
            </a>
        </div>

        <!-- Модалка настроек -->
        <div class="settings-modal" id="settings-modal">
            <div class="settings-header">
                <h3 id="set-title">Налаштування Padex</h3>
                <button class="close-btn" onclick="toggleSettings()">×</button>
            </div>
            
            <div class="setting-item">
                <label id="set-lang-lbl">Мова інтерфейсу:</label>
                <select id="lang-select" onchange="changeLanguage()">
                    <option value="uk" selected>Українська</option>
                    <option value="ru">Русский</option>
                </select>
            </div>

            <div class="setting-item">
                <label id="set-search-lbl">Пошукова система:</label>
                <select id="search-engine">
                    <option value="google">Google</option>
                    <option value="bing">Bing</option>
                </select>
            </div>

            <div class="setting-item">
                <label id="set-theme-lbl">Колірна схема:</label>
                <select id="theme-select" onchange="changeTheme()">
                    <option value="default" id="opt-theme-def">Стандартний Padex</option>
                    <option value="light" id="opt-theme-light">Світлі панелі</option>
                    <option value="cyber" id="opt-theme-cyber">Кіберпанк Неон</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const vpnBtn = document.getElementById('vpn-toggle');
        const vpnDropdown = document.getElementById('vpn-dropdown');
        const settingsModal = document.getElementById('settings-modal');
        const searchEngineSelect = document.getElementById('search-engine');
        const langSelect = document.getElementById('lang-select');
        
        let currentVpnCountry = null;

        const translations = {
            uk: {
                placeholder: "Введіть запит або адресу сайту...",
                vpnOff: "VPN: ВИМК",
                settingsTitle: "Налаштування Padex",
                langLbl: "Мова інтерфейсу:",
                searchLbl: "Пошукова система:",
                themeLbl: "Колірна схема:",
                themeDef: "Стандартний Padex",
                themeLight: "Світлі панелі",
                themeCyber: "Кіберпанк Неон",
                mail: "Google Пошта",
                maps: "Google Карти"
            },
            ru: {
                placeholder: "Введите запрос или адрес сайта...",
                vpnOff: "VPN: ВЫКЛ",
                settingsTitle: "Настройки Padex",
                langLbl: "Язык интерфейса:",
                searchLbl: "Поисковая система:",
                themeLbl: "Цветовая схема:",
                themeDef: "Стандартный Padex",
                themeLight: "Светлые панели",
                themeCyber: "Киберпанк Неон",
                mail: "Google Почта",
                maps: "Google Карты"
            }
        };

        function toggleSettings() {
            settingsModal.classList.toggle('active');
            vpnDropdown.classList.remove('active');
        }

        function toggleVpnDropdown() {
            vpnDropdown.classList.toggle('active');
            settingsModal.classList.remove('active');
        }

        function connectVPN(countryCode, buttonText) {
            currentVpnCountry = countryCode;
            vpnBtn.innerText = "VPN: " + buttonText;
            vpnBtn.classList.add('active');
            vpnDropdown.classList.remove('active');
        }

        function disconnectVPN() {
            currentVpnCountry = null;
            const lang = langSelect.value;
            vpnBtn.innerText = translations[lang].vpnOff;
            vpnBtn.classList.remove('active');
            vpnDropdown.classList.remove('active');
        }

        window.onclick = function(event) {
            if (!event.target.matches('.vpn-btn')) {
                if (vpnDropdown.classList.contains('active')) {
                    vpnDropdown.classList.remove('active');
                }
            }
        }

        function changeLanguage() {
            const lang = langSelect.value;
            const t = translations[lang];

            urlInput.placeholder = t.placeholder;
            if (!currentVpnCountry) {
                vpnBtn.innerText = t.vpnOff;
            }
            
            document.getElementById('set-title').innerText = t.settingsTitle;
            document.getElementById('set-lang-lbl').innerText = t.langLbl;
            document.getElementById('set-search-lbl').innerText = t.searchLbl;
            document.getElementById('set-theme-lbl').innerText = t.themeLbl;
            document.getElementById('opt-theme-def').innerText = t.themeDef;
            document.getElementById('opt-theme-light').innerText = t.themeLight;
            document.getElementById('opt-theme-cyber').innerText = t.themeCyber;
            
            document.getElementById('lbl-mail').innerText = t.mail;
            document.getElementById('lbl-maps').innerText = t.maps;
        }

        function changeTheme() {
            const theme = document.getElementById('theme-select').value;
            if (theme === 'light') {
                document.documentElement.style.setProperty('--accent-color', '#009688');
                document.documentElement.style.setProperty('--bar-bg', 'rgba(240, 240, 240, 0.85)');
                document.documentElement.style.setProperty('--panel-bg', 'rgba(255, 255, 255, 0.75)');
                document.documentElement.style.setProperty('--card-bg', 'rgba(0, 0, 0, 0.05)');
                document.querySelector('.browser-content').style.color = '#222';
                document.body.style.background = 'linear-gradient(135deg, #e0e0e0, #f5f5f5)';
            } else if (theme === 'cyber') {
                document.documentElement.style.setProperty('--accent-color', '#ff007f');
                document.documentElement.style.setProperty('--bar-bg', 'rgba(15, 0, 30, 0.85)');
                document.documentElement.style.setProperty('--panel-bg', 'rgba(30, 0, 60, 0.7)');
                document.documentElement.style.setProperty('--card-bg', 'rgba(255, 0, 127, 0.1)');
                document.querySelector('.browser-content').style.color = 'white';
                document.body.style.background = 'linear-gradient(135deg, #0f001e, #1e003c)';
            } else {
                document.documentElement.style.setProperty('--accent-color', '#00bcd4');
                document.documentElement.style.setProperty('--bar-bg', 'rgba(20, 20, 20, 0.75)');
                document.documentElement.style.setProperty('--panel-bg', 'rgba(0, 0, 0, 0.65)');
                document.documentElement.style.setProperty('--card-bg', 'rgba(255, 255, 255, 0.08)');
                document.querySelector('.browser-content').style.color = 'white';
                document.body.style.background = 'linear-gradient(135deg, #7da0b5, #9cb7c9, #b5cbd8)';
            }
        }

        function handleSearch(event) {
            if (event.key === 'Enter') {
                let query = urlInput.value.trim();
                if (!query) return;

                let targetUrl = '';
                if (query.includes('.') && !query.includes(' ')) {
                    targetUrl = query.startsWith('http') ? query : 'https://' + query;
                } else {
                    const engine = searchEngineSelect.value;
                    if (engine === 'bing') {
                        targetUrl = 'https://www.bing.com/search?q=' + encodeURIComponent(query);
                    } else {
                        targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(query);
                    }
                }

                window.open(targetUrl, '_blank');
                urlInput.value = '';
            }
        }
    </script>
</body>
</html>
